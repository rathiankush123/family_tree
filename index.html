<style>
:root{--bg:#d4d5d6;--conn-color:#4a4a6a;--accent:#4a6fa5;--text:#2c2c3a;--text-muted:#5a5a72;--text-dim:#9090a8;--shadow-card:0 8px 32px rgba(60,60,100,0.13),0 1.5px 6px rgba(60,60,100,0.07)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#toolbar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:rgba(255,255,255,0.55);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);border-bottom:1px solid rgba(255,255,255,0.7);flex-shrink:0;box-shadow:0 2px 12px rgba(60,60,100,0.07);flex-wrap:wrap}
#toolbar h1{font-family:'Lato',sans-serif;font-size:1.05rem;font-weight:900;color:var(--accent)}
.zoom-btn{width:32px;height:32px;border-radius:9px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);color:var(--text-muted);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(60,60,100,0.10);transition:all .13s;font-family:'Lato',sans-serif}
.zoom-btn:hover{background:rgba(255,255,255,0.85)}
#search-wrap{position:relative;display:flex;align-items:center}
#search-input{padding:5px 28px 5px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);color:var(--text);font-family:'Lato',sans-serif;font-size:.75rem;outline:none;width:170px;transition:all .15s}
#search-input:focus{background:rgba(255,255,255,0.75);border-color:var(--accent);width:200px}
#search-clear{position:absolute;right:8px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.8rem;display:none}
#search-count{font-size:.68rem;color:var(--text-dim);font-weight:700;display:none}
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;background-image:radial-gradient(circle,rgba(100,100,140,0.18) 1px,transparent 1px);background-size:30px 30px}
#canvas-wrap.panning{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;width:8000px;height:8000px;transform-origin:0 0}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.person-card{position:absolute;width:220px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.75);backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);user-select:none;box-shadow:var(--shadow-card);overflow:hidden;cursor:default}
.person-card.male{background:linear-gradient(160deg,#ffffff 0%,#c8deff 100%);border-color:rgba(180,210,255,0.7)}
.person-card.female{background:linear-gradient(160deg,#ffffff 0%,#ffd0e0 100%);border-color:rgba(255,190,210,0.7)}
.person-card.other{background:linear-gradient(160deg,#ffffff 0%,#c8f0d8 100%);border-color:rgba(160,230,190,0.7)}
.person-card.deceased{background:linear-gradient(160deg,#f0f0f0 0%,#d0d0d8 100%) !important;border-color:rgba(180,180,200,0.6) !important;filter:grayscale(.3);opacity:.85}
.person-card.search-highlight{box-shadow:0 0 0 3px #f5a623,0 8px 32px rgba(60,60,100,0.18)}
.card-photo{width:56px;height:56px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(60,60,100,0.12)}
.card-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.5)}
.card-name .fname{font-family:'Lato',sans-serif;font-size:.92rem;font-weight:700;color:#2c2c3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name .lname{font-size:.72rem;font-weight:400;color:#5a5a72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:5px;background:rgba(255,255,255,0.25)}
.card-row{display:flex;justify-content:space-between;align-items:center;font-size:.7rem}
.card-row .label{color:#9090a8;text-transform:uppercase;letter-spacing:.07em;font-size:.59rem;font-weight:700}

window.addEventListener('mouseup',function(){isPanning=false;wrap.classList.remove('panning')});
wrap.addEventListener('wheel',function(e){e.preventDefault();zoom(e.deltaY>0?-.1:.1,e.clientX,e.clientY)},{passive:false});
/* ── TOUCH ── */
function getTouchMid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2}}
function getTouchDist(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
wrap.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===1){isPanning=true;isPinching=false;panStart={x:e.touches[0].clientX-panX,y:e.touches[0].clientY-panY}}
  else if(e.touches.length===2){isPinching=true;isPanning=false;pinchDist=getTouchDist(e.touches)}
},{passive:false});
wrap.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(isPinching&&e.touches.length===2){
    var nd=getTouchDist(e.touches);
    var mid=getTouchMid(e.touches);
    var r=wrap.getBoundingClientRect();
    var delta=(nd-pinchDist)*0.008;
    zoom(delta,mid.x-r.left+r.left,mid.y-r.top+r.top);
    pinchDist=nd;
  } else if(isPanning&&e.touches.length===1){
    panX=e.touches[0].clientX-panStart.x;
    panY=e.touches[0].clientY-panStart.y;
    applyTransform();
  }
},{passive:false});
wrap.addEventListener('touchend',function(e){
  if(e.touches.length===0){isPanning=false;isPinching=false;wrap.classList.remove('panning')}
  else if(e.touches.length===1&&isPinching){isPinching=false;isPanning=true;panStart={x:e.touches[0].clientX-panX,y:e.touches[0].clientY-panY}}
},{passive:false});
function calcAge(dob,dod){var e=dod?new Date(dod):new Date(),s=new Date(dob),a=e.getFullYear()-s.getFullYear(),m=e.getMonth()-s.getMonth();if(m<0||(m===0&&e.getDate()<s.getDate()))a--;return a}
function fmt(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function emoji(g){return g==='female'?'👩':g==='male'?'👨':'🧑'}
function cardHTML(p){var age=calcAge(p.dob,p.dod);var ph=p.photo?'<div class="card-photo"><img src="'+p.photo+'"></div>':'<div class="card-photo">'+emoji(p.gender)+'</div>';var ar=p.dod?'<div class="card-row"><span class="label">Lived</span><span class="value">†'+age+' yrs</span></div>':'<div class="card-row"><span class="label">Age</span><span class="value age">'+age+' yrs</span></div>';var cb='';if(p.customFields&&p.customFields.length)cb='<div class="card-custom-fields">'+p.customFields.map(function(cf){return'<div class="card-custom-row"><span class="label">'+esc(cf.key)+'</span><span class="value">'+esc(cf.value)+'</span></div>'}).join('')+'</div>';return'<div class="card-header">'+ph+'<div class="card-name"><div class="fname">'+esc(p.firstName)+'</div><div class="lname">'+esc(p.lastName)+'</div></div></div><div class="card-body"><div class="card-row"><span class="label">Born</span><span class="value">'+fmt(p.dob)+'</span></div>'+(p.dod?'<div class="card-row"><span class="label">Demise</span><span class="value">'+fmt(p.dod)+'</span></div>':'')+ar+'<div class="card-city">📍 '+esc(p.city)+'</div></div>'+cb}
function createCard(p){var el=document.createElement('div');el.className='person-card '+p.gender+(p.dod?' deceased':'');el.dataset.id=p.id;el.style.left=p.x+'px';el.style.top=p.y+'px';el.innerHTML=cardHTML(p);canvas.appendChild(el)}
function getCC(id){var p=persons[id];var el=document.querySelector('.person-card[data-id="'+id+'"]');if(!el||!p)return null;return{x:p.x+el.offsetWidth/2,y:p.y+el.offsetHeight/2,top:p.y,bottom:p.y+el.offsetHeight,left:p.x,right:p.x+el.offsetWidth}}
function oPath(a,b){var dx=b.x-a.x,dy=b.y-a.y,x1,y1,x2,y2;if(Math.abs(dx)>Math.abs(dy)){if(dx>0){x1=a.right;y1=a.y;x2=b.left;y2=b.y}else{x1=a.left;y1=a.y;x2=b.right;y2=b.y}var mx=(x1+x2)/2;return'M'+x1+','+y1+' L'+mx+','+y1+' L'+mx+','+y2+' L'+x2+','+y2}else{if(dy>0){x1=a.x;y1=a.bottom;x2=b.x;y2=b.top}else{x1=a.x;y1=a.top;x2=b.x;y2=b.bottom}var my=(y1+y2)/2;return'M'+x1+','+y1+' L'+x1+','+my+' L'+x2+','+my+' L'+x2+','+y2}}
function drawConns(){document.querySelectorAll('.conn-group').forEach(function(e){e.remove()});connections.forEach(function(c){var a=getCC(c.from),b=getCC(c.to);if(!a||!b)return;var g=document.createElementNS('http://www.w3.org/2000/svg','g');g.classList.add('conn-group');var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.classList.add('conn-path');path.setAttribute('d',oPath(a,b));g.appendChild(path);var mx=(a.x+b.x)/2,my=(a.y+b.y)/2,tw=Math.max(c.label.length*6.8+20,36);var lbg=document.createElementNS('http://www.w3.org/2000/svg','rect');lbg.classList.add('conn-label-bg');lbg.setAttribute('x',mx-tw/2);lbg.setAttribute('y',my-11);lbg.setAttribute('width',tw);lbg.setAttribute('height',22);lbg.setAttribute('rx',11);g.appendChild(lbg);var lt=document.createElementNS('http://www.w3.org/2000/svg','text');lt.classList.add('conn-label-text');lt.setAttribute('x',mx);lt.setAttribute('y',my);lt.textContent=c.label;g.appendChild(lt);svgLayer.appendChild(g)})}
function doSearch(q){q=q.trim().toLowerCase();var cl=document.getElementById('search-clear'),ct=document.getElementById('search-count');document.querySelectorAll('.person-card').forEach(function(e){e.classList.remove('search-highlight')});searchMatches=[];searchIdx=-1;if(!q){cl.style.display='none';ct.style.display='none';return}cl.style.display='block';Object.values(persons).forEach(function(p){if((p.firstName+' '+p.lastName+' '+p.city).toLowerCase().includes(q))searchMatches.push(p.id)});if(!searchMatches.length){ct.textContent='No results';ct.style.display='block';return}searchMatches.forEach(function(id){var e=document.querySelector('.person-card[data-id="'+id+'"]');if(e)e.classList.add('search-highlight')});ct.textContent=searchMatches.length+' found';ct.style.display='block';searchIdx=0;jumpTo(searchMatches[0])}
function searchNav(e){if(e.key==='Enter'&&searchMatches.length){searchIdx=(searchIdx+1)%searchMatches.length;jumpTo(searchMatches[searchIdx])}}
function jumpTo(id){var p=persons[id];if(!p)return;var r=wrap.getBoundingClientRect();panX=r.width/2-(p.x+110)*scale;panY=r.height/2-(p.y+80)*scale;applyTransform()}
function clearSearch(){document.getElementById('search-input').value='';doSearch('')}
Object.values(persons).forEach(createCard);
drawConns();
applyTransform();
</script>
</body>
</html>
