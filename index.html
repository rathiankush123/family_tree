function createCard(p){var el=document.createElement('div');el.className='person-card '+p.gender+(p.dod?' deceased':'');el.dataset.id=p.id;el.style.left=p.x+'px';el.style.top=p.y+'px';el.innerHTML=cardHTML(p);canvas.appendChild(el)}
function getCC(id){var p=persons[id];var el=document.querySelector('.person-card[data-id="'+id+'"]');if(!el||!p)return null;return{x:p.x+el.offsetWidth/2,y:p.y+el.offsetHeight/2,top:p.y,bottom:p.y+el.offsetHeight,left:p.x,right:p.x+el.offsetWidth}}
function oPath(a,b){var dx=b.x-a.x,dy=b.y-a.y,x1,y1,x2,y2;if(Math.abs(dx)>Math.abs(dy)){if(dx>0){x1=a.right;y1=a.y;x2=b.left;y2=b.y}else{x1=a.left;y1=a.y;x2=b.right;y2=b.y}var mx=(x1+x2)/2;return'M'+x1+','+y1+' L'+mx+','+y1+' L'+mx+','+y2+' L'+x2+','+y2}else{if(dy>0){x1=a.x;y1=a.bottom;x2=b.x;y2=b.top}else{x1=a.x;y1=a.top;x2=b.x;y2=b.bottom}var my=(y1+y2)/2;return'M'+x1+','+y1+' L'+x1+','+my+' L'+x2+','+my+' L'+x2+','+y2}}
function drawConns(){document.querySelectorAll('.conn-group').forEach(function(e){e.remove()});connections.forEach(function(c){var a=getCC(c.from),b=getCC(c.to);if(!a||!b)return;var g=document.createElementNS('http://www.w3.org/2000/svg','g');g.classList.add('conn-group');var path=document.createElementNS('http://www.w3.org/2000/svg','path');path.classList.add('conn-path');path.setAttribute('d',oPath(a,b));g.appendChild(path);var mx=(a.x+b.x)/2,my=(a.y+b.y)/2,tw=Math.max(c.label.length*6.8+20,36);var lbg=document.createElementNS('http://www.w3.org/2000/svg','rect');lbg.classList.add('conn-label-bg');lbg.setAttribute('x',mx-tw/2);lbg.setAttribute('y',my-11);lbg.setAttribute('width',tw);lbg.setAttribute('height',22);lbg.setAttribute('rx',11);g.appendChild(lbg);var lt=document.createElementNS('http://www.w3.org/2000/svg','text');lt.classList.add('conn-label-text');lt.setAttribute('x',mx);lt.setAttribute('y',my);lt.textContent=c.label;g.appendChild(lt);svgLayer.appendChild(g)})}
function doSearch(q){q=q.trim().toLowerCase();var cl=document.getElementById('search-clear'),ct=document.getElementById('search-count');document.querySelectorAll('.person-card').forEach(function(e){e.classList.remove('search-highlight')});searchMatches=[];searchIdx=-1;if(!q){cl.style.display='none';ct.style.display='none';return}cl.style.display='block';Object.values(persons).forEach(function(p){if((p.firstName+' '+p.lastName+' '+p.city).toLowerCase().includes(q))searchMatches.push(p.id)});if(!searchMatches.length){ct.textContent='No results';ct.style.display='block';return}searchMatches.forEach(function(id){var e=document.querySelector('.person-card[data-id="'+id+'"]');if(e)e.classList.add('search-highlight')});ct.textContent=searchMatches.length+' found';ct.style.display='block';searchIdx=0;jumpTo(searchMatches[0])}
function searchNav(e){if(e.key==='Enter'&&searchMatches.length){searchIdx=(searchIdx+1)%searchMatches.length;jumpTo(searchMatches[searchIdx])}}
function jumpTo(id){var p=persons[id];if(!p)return;var r=wrap.getBoundingClientRect();panX=r.width/2-(p.x+110)*scale;panY=r.height/2-(p.y+80)*scale;applyTransform()}
function clearSearch(){document.getElementById('search-input').value='';doSearch('')}
Object.values(persons).forEach(createCard);
drawConns();
applyTransform();
</script>
</body>
</html>
